<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0a0a18"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Retro gamepad silhouette -->
  <g transform="translate(64,148)" fill="none">
    <rect x="0" y="0" width="384" height="216" rx="56" fill="#e60012"/>
    <!-- D-pad -->
    <g fill="#1a1a2e" transform="translate(72,108)">
      <rect x="-12" y="-44" width="24" height="88" rx="4"/>
      <rect x="-44" y="-12" width="88" height="24" rx="4"/>
    </g>
    <!-- Action buttons -->
    <g fill="#1a1a2e" transform="translate(296,108)">
      <circle cx="0" cy="-32" r="14"/>
      <circle cx="32" cy="0" r="14"/>
      <circle cx="0" cy="32" r="14"/>
      <circle cx="-32" cy="0" r="14"/>
    </g>
    <!-- Center logo dot -->
    <circle cx="192" cy="108" r="10" fill="#ffd700"/>
  </g>
</svg>
